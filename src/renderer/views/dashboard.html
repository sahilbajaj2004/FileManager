<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../styles/index.css">
</head>
<body>
  <div id="dashboard" class="dashboard-container">
    <!-- Top: Summary Cards -->
    <section class="dashboard-summary" id="dashboard-summary"></section>
    <!-- Middle: Charts/Graphs and Recent Activity -->
    <div class="dashboard-middle">
      <section class="dashboard-charts" id="dashboard-charts"></section>
      <section class="dashboard-activity" id="dashboard-activity"></section>
    </div>
    <!-- Bottom: Notifications and Quick Actions -->
    <div class="dashboard-bottom">
      <section class="dashboard-notifications" id="dashboard-notifications"></section>
      <section class="dashboard-actions" id="dashboard-actions"></section>
    </div>
  </div>
  <script src="../components/dashboard.js"></script>
</body>
</html>
